<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Button Color Palette</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">

  <h1 class="text-3xl font-bold mb-6">Color Palette</h1>
  <div class="flex gap-4 mb-8">
    <button data-color="red" class="bg-red-500 text-white px-4 py-2 rounded">
      Red
    </button>
    <button data-color="blue" class="bg-blue-500 text-white px-4 py-2 rounded">
      Blue
    </button>
    <button data-color="green" class="bg-green-500 text-white px-4 py-2 rounded">
      Green
    </button>
    <button data-color="purple" class="bg-purple-500 text-white px-4 py-2 rounded">
      Purple
    </button>
  </div>
  <div id="colorBox" class="w-64 h-40 bg-white border-2 border-gray-400 rounded-lg flex items-center justify-center text-xl font-bold">
    Color Box
  </div>
  <script src="script.js"></script>

</body>
</html>
